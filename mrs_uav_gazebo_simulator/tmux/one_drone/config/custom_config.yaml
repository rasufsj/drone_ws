# GET ALL PARAMETERS USABLE FOR CUSTOM CONFIG BY RUNNING:
## --------------------------------------------------------------
## |          rosrun mrs_uav_core get_public_params.py          #
## --------------------------------------------------------------

mrs_uav_managers:

  estimation_manager:

    # loaded state estimator plugins (sem GPS; passthrough para odometria direta da simulação)
    state_estimators: ["passthrough"]

    initial_state_estimator: "passthrough"  # usa odometria bruta do PX4/Gazebo como inicial
    agl_height_estimator: ""  # Desabilitado, como sugerido

  # passthrough não precisa de transform_manager complexo
  transform_manager:
    passthrough:
      utm_based: false
      republish_in_frames: ["local_origin", "stable_origin", "fcu_untilted"]

  uav_manager:

    takeoff:

      during_takeoff:
        controller: "MpcController"
        tracker: "LandoffTracker"

      after_takeoff:
        controller: "Se3Controller"
        tracker: "MpcTracker"
  
 # Adicione sua seção control_manager se precisar (opcional, para MPC detalhado) 
  
  control_manager:
    mpc_controller:
      detailed_model:
        model_params:
          enabled: true
          propulsion:
            force_constant: 0.00000012216
            torque_constant: 0.07
            prop_radius: 0.11
            allocation_matrix:
              - -0.159, 0.159, 0.159, -0.159  # Ajustado para f450 (roll/pitch * arm_length ~0.225m)
              - -0.159, 0.159, -0.159, 0.159
              - -1, -1, 1, 1
              - 1, 1, 1, 1
          rpm:
            min: 1360
            max: 9068