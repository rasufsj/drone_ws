# do not modify these
root: ./
name: simulation
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
# you can modify these
pre_window:
  - export UAV_NAME=uav1
  - export RUN_TYPE=simulation
  - export UAV_TYPE=f450
  - export PLATFORM_CONFIG=`ros2 pkg prefix mrs_uav_gazebo_simulator`/share/mrs_uav_gazebo_simulator/config/mrs_uav_system/$UAV_TYPE.yaml
  - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
  - export USE_SIM_TIME="true"
  - export GZ_SIM_MODEL_PATH=$GAZEBO_MODEL_PATH:/home/lmnr31/ros2_ws/src/arena_2025_desenho
  - export GZ_SIM_RESOURCE_PATH=$GAZEBO_RESOURCE_PATH:/home/lmnr31/ros2_ws/src/arena_2025_desenho
startup_window: status
windows:
  - zenoh_router:
      layout: tiled
      panes:
        - ros2 run rmw_zenoh_cpp rmw_zenohd
  - gazebo:
      layout: tiled
      panes:
        - ros2 launch mrs_uav_gazebo_simulator simulation.launch.py world_file:=/home/lmnr31/ros2_ws/src/arena_2025_desenho/my_arena.world gz_headless:=false gz_verbose:=true
        - |
          waitForGazebo; sleep 5; ros2 service call /mrs_drone_spawner/spawn mrs_msgs/srv/String "{value: '1 --$UAV_TYPE  --pos -0.85 0.70 1 1.57 '}"
  - px4_api:
      layout: tiled
      panes:
        - ros2 launch mrs_uav_px4_api api.launch.py
  - core:
      layout: tiled
      panes:
        - ros2 launch mrs_uav_core core.launch.py
          platform_config:=$PLATFORM_CONFIG custom_config:=/home/lmnr31/ros2_ws/mrs_uav_gazebo_simulator/tmux/one_drone/config/custom_config.yaml
          world_config:=./config/world_config.yaml
          custom_config:=./config/custom_config.yaml
          network_config:=./config/network_config.yaml
  - wait_for_arming:
      layout: tiled
      panes:
        - sleep 10 
  - status:
      layout: tiled
      panes:
        - sleep 10; ros2 run mrs_uav_status status.sh
  - autostart:
      layout: tiled
      panes:
        - sleep 10; ros2 launch mrs_uav_autostart automatic_start.launch.py custom_config:=./config/automatic_start.yaml
  - takeoff:
      layout: tiled
      panes:
        - waitForCore; sleep 15; ./takeoff.sh
  - rviz:
      layout: tiled
      panes:
        - waitForCore; ros2 run rviz2 rviz2 -d ./rviz.rviz --ros-args -p use_sim_time:=true
  - layout:
      layout: tiled
      panes:
        - waitForCore; sleep 2; ~/.i3/layout_manager.sh ./layout.json
  - controller:
      layout: tiled
      panes:
       - waitForCore; sleep 30; python3 ./scripts/drone_exploration.py